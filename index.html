<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My App</title>
  <title>Свердловини GIS</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link rel="stylesheet" href="style.css?v=20260614-3" />
</head>
<body>
   <div id="searchBox">
  <span class="search-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M10.5 18a7.5 7.5 0 1 0 0-15 7.5 7.5 0 0 0 0 15z"
        stroke="currentColor" stroke-width="2"/>
      <path d="M16 16l5 5"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </span>
  <input
  id="searchCity"
  placeholder="Пошук населених пунктів"
  oninput="searchCityPRO(this.value)"
/>
  <button id="clearSearch" onclick="clearSearch()" aria-label="Очистити пошук">×</button>
  <div id="suggestions"></div>
</div>
<div class="drawer-handle left" onclick="toggleSidebar()">❯</div>

<div class="drawer-handle right" onclick="toggleFormPanel()">❯</div>

<!-- =========================
     📋 ЛІВА ПАНЕЛЬ
========================= -->
<div id="sidebar">

  <h3>
    <span class="icon">
      <!-- gear / settings -->
<svg viewBox="0 0 24 24" fill="none">
  <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"
        stroke="currentColor" stroke-width="2"/>
  <path d="M19 12a7 7 0 0 0-.2-1l1.8-1.2-1.5-2.6-2 .6a7 7 0 0 0-1.6-1L14.8 4h-4.6L9.5 6.2a7 7 0 0 0-1.6 1l-2-.6-1.5 2.6L6.2 11a7 7 0 0 0 0 2l-1.8 1.2 1.5 2.6 2-.6a7 7 0 0 0 1.6 1L10.2 20h4.6l.7-2.2a7 7 0 0 0 1.6-1l2 .6 1.5-2.6L18.8 13a7 7 0 0 0 .2-1z"
        stroke="currentColor" stroke-width="2"/>
</svg>
    </span>
    Інструменти
  </h3>

  <button onclick="toggleTheme()">
    <span class="icon">
      <!-- moon -->
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3
                 7 7 0 1 0 21 12.8z"
              stroke="currentColor" stroke-width="2"/>
      </svg>
    </span>
    Темна тема
  </button>
  <hr>

<button class="tool-header">
  <span class="icon">
    <!-- calculator icon -->
    <svg viewBox="0 0 24 24" fill="none">
      <rect x="4" y="3" width="16" height="18" rx="2"
        stroke="currentColor" stroke-width="2"/>
      <path d="M8 7h8"
        stroke="currentColor" stroke-width="2"/>
      <path d="M8 11h2M12 11h2M16 11h2"
        stroke="currentColor" stroke-width="2"/>
      <path d="M8 15h2M12 15h2M16 15h2"
        stroke="currentColor" stroke-width="2"/>
    </svg>
  </span>

  Калькулятор вартості
</button>

<div class="section-title">Ø Діаметр обсадної труби</div>

<div class="radio-group">

  <label class="radio-item">
    <input type="radio" name="pipeType" value="850" checked>
    <span class="dot"></span>
    ПНД-50 — 850 грн/м
  </label>

  <label class="radio-item">
    <input type="radio" name="pipeType" value="1100">
    <span class="dot"></span>
    90 — 1100 грн/м
  </label>

</div>
<input id="estDepth" placeholder="Орієнтовна глибина (м)" />
<input id="transportCost" placeholder="Транспортні витрати" />
<input id="filterCost" placeholder="Ціна за фільтр" />

<input id="totalCost" placeholder="Загальна вартість" readonly />

  <hr>

  <div class="section-title">
    <span class="icon">
      <!-- layers -->
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2l10 5-10 5L2 7l10-5z"
              stroke="currentColor" stroke-width="2"/>
        <path d="M2 12l10 5 10-5"
              stroke="currentColor" stroke-width="2"/>
        <path d="M2 17l10 5 10-5"
              stroke="currentColor" stroke-width="2"/>
      </svg>
    </span>
    Шари карти
  </div>

  <div id="layerControl"></div>

</div>

<!-- =========================
     🗺 КАРТА
========================= -->
<div id="map"></div>
<button id="addBtn" onclick="startAddPoint()">＋</button>
<!-- =========================
     📋 ПРАВА ПАНЕЛЬ (ФОРМА)
========================= -->
<div id="formPanel" class="bottom-sheet">

  <div class="header">
    <b>💧 Журнал свердловин</b>
  </div>

  <input id="num" placeholder="№ свердловини" />
  <input id="depth" placeholder="Глибина (м)" />
  <input id="water" placeholder="Рівень води (м)" />
  <input id="soil" placeholder="Ґрунт" />
  <input id="elevation" placeholder="Висота над рівнем моря (м)" readonly />
  <input id="distance" placeholder="Відстань до Полтави (км)" readonly />

  <textarea id="note" placeholder="Примітка"></textarea>

  <!-- КНОПКИ -->
<div class="btn-stack">
  <div class="btn-row">
    <span class="btn-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4z"
          stroke="currentColor" stroke-width="2"/>
        <path d="M7 3v6h8V3"
          stroke="currentColor" stroke-width="2"/>
        <path d="M7 13h10v6H7"
          stroke="currentColor" stroke-width="2"/>
      </svg>
    </span>
    <button onclick="saveBorehole()" class="btn">
      Зберегти
    </button>
  </div>
  <div class="btn-row">
    <span class="btn-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"
          stroke="currentColor" stroke-width="2"/>
        <path d="M14.06 4.94l3.75 3.75"
          stroke="currentColor" stroke-width="2"/>
      </svg>
    </span>
    <button onclick="updateBorehole()" class="btn">
      Оновити
    </button>
  </div>
  <div class="btn-row">
    <span class="btn-icon delete-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18"
          stroke="currentColor" stroke-width="2"/>
        <path d="M8 6V4h8v2"
          stroke="currentColor" stroke-width="2"/>
        <path d="M6 6l1 16h10l1-16"
          stroke="currentColor" stroke-width="2"/>
      </svg>
    </span>
    <button onclick="deleteSelected()" class="btn delete">
      Видалити
    </button>
  </div>
</div>

<!-- =========================
     📦 SCRIPTS
========================= -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=20260614-3"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    updateDoc,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxzts21niU3X3lusAq7SNmYwe5MrrtVK8",
    authDomain: "boreholes-map.firebaseapp.com",
    projectId: "boreholes-map",
    storageBucket: "boreholes-map.firebasestorage.app",
    messagingSenderId: "867022898841",
    appId: "1:867022898841:web:098a32818004c5c5e85a08",
    measurementId: "G-3BBS4PZPJ3"
  };

  const firebaseConfigured = Object.values(firebaseConfig).every(value =>
    value &&
    !String(value).includes("ТВІЙ") &&
    !String(value).includes("....")
  );

  if (firebaseConfigured) {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.firebaseAddDoc = addDoc;
    window.firebaseCollection = collection;
    window.firebaseGetDocs = getDocs;

    window.firebaseUpdateDoc = updateDoc;
    window.firebaseDeleteDoc = deleteDoc;
    window.firebaseDoc = doc;
    window.firebaseReady = true;
  } else {
    window.firebaseReady = false;
    console.warn("Firebase не налаштований. Точки зберігаються локально в браузері.");
  }
</script>

</body>
</html>
